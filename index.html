<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ViralCut — Vertical Video Editor</title>
  <script src="lib/coi-serviceworker.js"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <!-- ===== Header ===== -->
    <header id="header">
      <span class="brand">ViralCut</span>
      <button id="btnOpenProject" class="btn">プロジェクトを開く</button>
      <button id="btnNewProject" class="btn">新規</button>
      <button id="btnAddVideo" class="btn" disabled>動画を追加</button>
      <span class="sep"></span>
      <button id="btnUndo" class="btn" disabled title="Ctrl+Z">↶ Undo</button>
      <button id="btnRedo" class="btn" disabled title="Ctrl+Shift+Z">↷ Redo</button>
      <span class="sep"></span>
      <button id="btnSave" class="btn" disabled title="Ctrl+S">保存</button>
      <button id="btnExport" class="btn btn-accent" disabled>書き出し</button>
      <span class="spacer"></span>
      <span id="status" class="status">プロジェクト未選択</span>
    </header>

    <!-- ===== Top: source player + 9:16 preview ===== -->
    <section id="stage">
      <div id="sourcePane" class="pane">
        <div class="pane-head">
          <select id="sourceSelect"></select>
          <span id="sourceTime" class="time">0:00 / 0:00</span>
        </div>
        <div class="video-wrap">
          <video id="sourceVideo" playsinline></video>
          <div id="sourceEmpty" class="empty">動画を追加してください</div>
        </div>
        <div class="transport">
          <button id="btnPlay" class="btn">▶</button>
          <button id="btnSetIn" class="btn">[ IN</button>
          <button id="btnSetOut" class="btn">OUT ]</button>
          <button id="btnAddClip" class="btn btn-accent">＋ クリップ追加</button>
        </div>
      </div>

      <div id="previewPane" class="pane">
        <div class="pane-head"><span>出力プレビュー 9:16</span></div>
        <div class="preview-wrap">
          <canvas id="previewCanvas"></canvas>
        </div>
        <div class="crop-controls">
          <label>パンX <input id="panX" type="range" min="0" max="1" step="0.001" value="0.5"></label>
          <label>パンY <input id="panY" type="range" min="0" max="1" step="0.001" value="0.5"></label>
          <label>ズーム <input id="zoom" type="range" min="1" max="3" step="0.01" value="1"></label>
        </div>
      </div>
    </section>

    <!-- ===== Middle: source thumbnail strip + trim ===== -->
    <section id="stripPane" class="pane">
      <div class="pane-head">
        <span>ソース タイムライン</span>
        <span class="spacer"></span>
        <label>ズーム <input id="stripZoom" type="range" min="1" max="8" step="0.1" value="1"></label>
      </div>
      <div id="stripScroll" class="strip-scroll">
        <div id="stripInner" class="strip-inner">
          <div id="thumbRow" class="thumb-row"></div>
          <div id="trimIn" class="trim-handle trim-in"></div>
          <div id="trimOut" class="trim-handle trim-out"></div>
          <div id="trimRange" class="trim-range"></div>
          <div id="playhead" class="playhead"></div>
        </div>
      </div>
    </section>

    <!-- ===== Bottom: output clip list ===== -->
    <section id="clipsPane" class="pane">
      <div class="pane-head">
        <span>出力クリップ</span>
        <span id="totalDur" class="time">合計 0:00</span>
      </div>
      <div id="clipList" class="clip-list">
        <div class="clip-empty">IN/OUT を決めて「クリップ追加」</div>
      </div>
    </section>
  </div>

  <div id="overlay" class="overlay" hidden>
    <div class="overlay-box">
      <div id="overlayMsg">処理中…</div>
      <progress id="overlayProg" max="100" value="0"></progress>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
