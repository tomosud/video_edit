<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ViralCut — Vertical Video Editor</title>
  <script src="lib/coi-serviceworker.js"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">

    <!-- ===== Row 1: Menu ===== -->
    <header id="menu">
      <span class="brand">ViralCut</span>
      <button id="btnNewProject" class="btn">新規</button>
      <button id="btnOpenProject" class="btn">開く</button>
      <button id="btnSave" class="btn" disabled title="Ctrl+S">保存</button>
      <span class="sep"></span>
      <button id="btnAddVideo" class="btn" disabled>動画を追加</button>
      <select id="sourceSelect" class="sel" disabled></select>
      <span class="sep"></span>
      <button id="btnUndo" class="btn" disabled title="Ctrl+Z">↶</button>
      <button id="btnRedo" class="btn" disabled title="Ctrl+Shift+Z">↷</button>
      <span class="sep"></span>
      <button id="btnExport" class="btn btn-accent" disabled>書き出し</button>
      <span class="spacer"></span>
      <span id="status" class="status">プロジェクト未選択</span>
    </header>

    <!-- ===== Row 2: Source timeline ===== -->
    <section id="srcPane" class="pane">
      <div class="pane-head">
        <span>ソースタイムライン</span>
        <span class="hint">空クリックでクリップ作成 / 端ドラッグでトリム / ダブルクリックで再生 / ホイールでズーム</span>
        <span class="spacer"></span>
        <span id="srcRange" class="time">—</span>
      </div>
      <div id="tlScroll" class="tl-scroll">
        <div id="tlInner" class="tl-inner">
          <div id="thumbRow" class="thumb-row"></div>
          <div id="clipBands" class="clip-bands"></div>
          <div id="tlPlayhead" class="playhead"></div>
        </div>
      </div>
    </section>

    <!-- ===== Row 3: Shelf + previews ===== -->
    <section id="workPane">
      <div id="shelfPane" class="pane">
        <div class="pane-head"><span>切り出し素材</span><span class="spacer"></span><span id="shelfCount" class="time">0</span></div>
        <div id="shelf" class="shelf">
          <div class="placeholder">タイムラインでクリップを作成</div>
        </div>
      </div>

      <div id="origPane" class="pane">
        <div class="pane-head"><span>元比率プレビュー</span><span class="spacer"></span><span id="origTime" class="time">0:00 / 0:00</span></div>
        <div class="video-wrap">
          <video id="srcVideo" playsinline></video>
          <div id="srcEmpty" class="placeholder abs">動画を追加してください</div>
        </div>
        <div class="transport">
          <button id="btnPlay" class="btn" title="Space">▶</button>
          <button id="btnLoop" class="btn" title="範囲ループ">↻ ループ</button>
        </div>
      </div>

      <div id="vertPane" class="pane">
        <div class="pane-head"><span>縦動画 9:16</span></div>
        <div class="preview-wrap">
          <canvas id="vertCanvas"></canvas>
        </div>
        <div class="crop-controls">
          <label>X <input id="panX" type="range" min="0" max="1" step="0.001" value="0.5"></label>
          <label>Y <input id="panY" type="range" min="0" max="1" step="0.001" value="0.5"></label>
          <label>Z <input id="zoom" type="range" min="1" max="3" step="0.01" value="1"></label>
        </div>
      </div>
    </section>

    <!-- ===== Row 4: Output sequence ===== -->
    <section id="outPane" class="pane">
      <div class="pane-head">
        <span>出力クリップ（編集）</span>
        <button id="btnPlayOut" class="btn btn-sm" disabled title="出力を連続再生">▶ 連続再生</button>
        <button id="btnStopOut" class="btn btn-sm" disabled title="停止">■</button>
        <span class="hint">素材をここへドロップ / ダブルクリックで再生 / ドラッグで並び替え</span>
        <span class="spacer"></span>
        <span id="totalDur" class="time">合計 0:00</span>
      </div>
      <div id="outList" class="out-list">
        <div class="placeholder">素材をドロップして並べる</div>
      </div>
    </section>

  </div>

  <div id="overlay" class="overlay" hidden>
    <div class="overlay-box">
      <div id="overlayMsg">処理中…</div>
      <progress id="overlayProg" max="100" value="0"></progress>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
